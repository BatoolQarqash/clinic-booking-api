<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Doctors - ClinicBooking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="cb-bg">
  <div class="cb-shell cb-page">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="d-flex align-items-center gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="admin-dashboard.html">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <div class="fw-semibold">Manage Doctors</div>
          <div class="text-muted small">Create / edit / delete</div>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary btn-sm" id="newDoctorBtn">
          <i class="bi bi-plus-lg"></i> New
        </button>
        <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>

    <div id="pageError" class="alert alert-danger d-none"></div>
    <div id="pageOk" class="alert alert-success d-none"></div>

    <!-- Filters -->
    <div class="row g-2 mb-3">
      <div class="col-12 col-md-5">
        <input id="q" class="form-control" placeholder="Search by name..." />
      </div>
      <div class="col-12 col-md-4">
        <select id="serviceId" class="form-select">
          <option value="">All services</option>
        </select>
      </div>
      <div class="col-12 col-md-3">
        <button class="btn btn-outline-primary w-100" id="applyBtn">
          <i class="bi bi-funnel"></i> Apply
        </button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-responsive">
      <table class="table table-sm align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Doctor</th>
            <th>Service</th>
            <th>Fee</th>
            <th>Rating</th>
            <th>Active</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <!-- Upsert Modal -->
    <div class="modal fade" id="doctorModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modalTitle">Doctor</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <div id="modalError" class="alert alert-danger d-none"></div>

            <!-- Hidden id for edit -->
            <input type="hidden" id="doctorId" />

            <div class="row g-2">
              <div class="col-12 col-md-6">
                <label class="form-label">Full Name</label>
                <input id="fullName" class="form-control" />
              </div>
              <div class="col-12 col-md-6">
                <label class="form-label">Title</label>
                <input id="title" class="form-control" placeholder="e.g., Cardiologist" />
              </div>

              <div class="col-12">
                <label class="form-label">Bio</label>
                <textarea id="bio" class="form-control" rows="3"></textarea>
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label">Clinic Name</label>
                <input id="clinicName" class="form-control" />
              </div>

              <div class="col-12 col-md-6">
                <label class="form-label">Image URL</label>
                <input id="imageUrl" class="form-control" placeholder="https://..." />
              </div>

              <div class="col-12 col-md-4">
                <label class="form-label">Service</label>
                <select id="serviceIdModal" class="form-select"></select>
              </div>

              <div class="col-12 col-md-4">
                <label class="form-label">Fee</label>
                <input id="fee" type="number" class="form-control" min="0" step="1" />
              </div>

              <div class="col-12 col-md-4">
                <label class="form-label">Rating</label>
                <input id="rating" type="number" class="form-control" min="0" max="5" step="0.1" />
              </div>

              <div class="col-12">
                <div class="form-check mt-2">
                  <input id="isActive" class="form-check-input" type="checkbox" checked />
                  <label class="form-check-label">Active</label>
                </div>
              </div>
            </div>

          </div>

          <div class="modal-footer">
            <button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button class="btn btn-primary" id="saveBtn">
              <i class="bi bi-check2"></i> Save
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/admin.js"></script>
  <script src="../js/admin-doctors.js"></script>
</body>
</html>
