<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Favorite Doctors - ClinicBooking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="../css/main.css" rel="stylesheet">
<link href="../css/user-layout.css" rel="stylesheet">
</head>

<body class="cb-bg">
  <div class="cb-shell">

    <!-- Top bar -->
    <header class="d-flex align-items-center justify-content-between pt-3 px-3">
      <div class="d-flex align-items-center gap-2">
  <button
    class="cb-menu-btn"
    id="menuToggle"
    type="button"
    aria-label="Open menu"
    title="Menu"
  >
    <i class="bi bi-list"></i>
  </button>

   <button
  class="btn cb-icon-btn"
  type="button"
  title="Back"
  data-smart-back
  data-fallback="home.html"
>
  <i class="bi bi-chevron-left"></i>
</button>
</div>

      <div class="fw-semibold">Favorite Doctors</div>

      <div style="width:40px;"></div>
    </header>

    <!-- Content -->
    <main class="px-3 mt-3 mb-5">

      <!-- Info message -->
      <div id="pageMsg" class="alert d-none"></div>

      <!-- Favorites list -->
      <div id="favoritesList" class="row g-3 mt-1">
        <!-- Filled by JS -->
      </div>

      <!-- Empty state -->
      <div id="emptyBox" class="alert alert-info d-none mt-3">
        You have no favorite doctors yet.
      </div>

    </main>

    <!-- Shared user nav -->
      <div id="userNavMount"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.dom.js"></script>
  <script src="../js/utils.ui.js"></script>
  <script src="../js/utils.session.js"></script>
  <script src="../js/user-layout.js"></script>
  <script src="../js/mobile-nav.js"></script>
  <script src="../js/favorites.js"></script>
</body>
</html>
