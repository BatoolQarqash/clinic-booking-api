<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Appointments - ClinicBooking</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link href="../css/main.css" rel="stylesheet">
</head>

<body class="cb-bg">
  <div class="cb-shell">

    <!-- Top bar -->
    <header class="d-flex align-items-center justify-content-between pt-3 px-3">
      <div class="d-flex align-items-center gap-2">
  <button
    class="cb-menu-btn"
    id="menuToggle"
    type="button"
    aria-label="Open menu"
    title="Menu"
  >
    <i class="bi bi-list"></i>
  </button>

  <a class="btn cb-icon-btn" href="home.html" title="Back">
    <i class="bi bi-chevron-left"></i>
  </a>
</div>

      <div class="fw-semibold">My Appointments</div>

      <button id="refreshBtn" class="btn cb-icon-btn" type="button" title="Refresh">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </header>

    <!-- Content -->
    <main class="px-3 mt-3 mb-5">

      <!-- Info / Errors -->
      <div id="pageMsg" class="alert d-none"></div>

      <!-- Loading text -->
      <div id="loadingBox" class="text-muted small d-none">
        Loading appointments...
      </div>

      <!-- List -->
      <div id="apptList" class="d-flex flex-column gap-3 mt-3">
        <!-- Cards inserted by JS -->
      </div>

      <!-- Empty state -->
      <div id="emptyBox" class="alert alert-info d-none mt-3">
        You have no appointments yet.
      </div>

    </main>

    <!-- Bottom nav -->
     <div class="cb-nav-overlay" id="navOverlay"></div>
      <nav class="cb-bottom-nav">
  <a class="cb-nav-item" href="home.html" title="Home">
    <i class="bi bi-house-fill"></i>
    <span class="cb-nav-label">Home</span>
  </a>

  <a class="cb-nav-item" href="doctors.html" title="Doctors">
    <i class="bi bi-people-fill"></i>
    <span class="cb-nav-label">Doctors</span>
  </a>

  <a class="cb-nav-item active" href="my-appointments.html" title="Appointments">
    <i class="bi bi-clipboard-check"></i>
    <span class="cb-nav-label">Appointments</span>
  </a>

  <a class="cb-nav-item" href="favorites.html" title="Favorites">
    <i class="bi bi-heart"></i>
    <span class="cb-nav-label">Favorites</span>
  </a>
</nav>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <!-- Shared utilities (must be loaded BEFORE page scripts) -->
<script src="../js/utils.dom.js"></script>
<script src="../js/utils.ui.js"></script>
<script src="../js/utils.session.js"></script>
<script src="../js/mobile-nav.js"></script>

  <script src="../js/my-appointments.js"></script>
</body>
</html>
