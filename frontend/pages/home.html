AS<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home - ClinicBooking</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link href="../css/main.css" rel="stylesheet">
</head>

<body class="cb-bg">

  <!-- Mobile-like container (centered on desktop) -->
  <div class="cb-shell">

    <!-- Header -->
    <header class="d-flex align-items-center justify-content-between pt-3 px-3">
      <div class="d-flex align-items-center gap-2">
        <img src="../assets/img/avatar.png" class="cb-avatar" alt="avatar" onerror="this.style.display='none'">
        <div>
          <div class="cb-hello">
            Hello <span class="cb-hello-name" id="helloName">User</span> !
          </div>
        </div>
      </div>

      <div class="d-flex align-items-center gap-3">
        <button class="btn cb-icon-btn" type="button" title="Notifications">
          <i class="bi bi-bell"></i>
        </button>
      </div>
    </header>

    <!-- Search -->
    <section class="px-3 mt-3">
      <div class="d-flex align-items-center gap-2">
        <div class="cb-search flex-grow-1">
          <i class="bi bi-search cb-search-icon"></i>
          <input id="searchInput" class="cb-search-input" placeholder="Search" />
        </div>

        <button class="btn cb-icon-btn" type="button" title="Filter">
          <i class="bi bi-sliders"></i>
        </button>
      </div>
    </section>

    <!-- Services -->
    <section class="px-3 mt-4">
      <div class="d-flex align-items-center justify-content-between">
        <h2 class="cb-section-title m-0">Services</h2>
        <a class="cb-pill-link" href="doctors.html">
          see all <i class="bi bi-chevron-right"></i>
        </a>
      </div>

      <div id="servicesRow" class="cb-services-row mt-3">
        <!-- filled by JS -->
      </div>

      <div id="servicesError" class="alert alert-danger d-none mt-3"></div>
    </section>

    <!-- Top Doctors -->
    <section class="px-3 mt-4 mb-5">
      <h2 class="cb-section-title mb-3">Top Doctors</h2>

      <div id="doctorsList" class="d-flex flex-column gap-3">
        <!-- filled by JS -->
      </div>

      <div id="doctorsError" class="alert alert-danger d-none mt-3"></div>
    </section>

    <!-- Bottom Nav -->
    <nav class="cb-bottom-nav">
      <a class="cb-nav-item active" href="home.html"><i class="bi bi-house-fill"></i></a>
      <a class="cb-nav-item" href="#"><i class="bi bi-calendar2"></i></a>
      <a class="cb-nav-item" href="#"><i class="bi bi-heart"></i></a>
      <a class="cb-nav-item" href="my-appointments.html"><i class="bi bi-person"></i></a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/home.js"></script>
</body>
</html>
