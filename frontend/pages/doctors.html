<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doctors - ClinicBooking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="../css/main.css" rel="stylesheet">
</head>

<body class="cb-bg">
  <div class="cb-shell">

    <!-- Top bar -->
    <header class="d-flex align-items-center justify-content-between pt-3 px-3">
      <a class="btn cb-icon-btn" href="home.html" title="Back">
        <i class="bi bi-chevron-left"></i>
      </a>

      <div class="fw-semibold" id="pageTitle">Doctors</div>

      <button class="btn cb-icon-btn" type="button" title="Filter">
        <i class="bi bi-sliders"></i>
      </button>
    </header>

    <!-- Search + Filter -->
    <section class="px-3 mt-3">
      <div class="cb-search">
        <i class="bi bi-search cb-search-icon"></i>
        <input id="searchInput" class="cb-search-input" placeholder="Search doctor name..." />
      </div>

      <div class="d-flex align-items-center gap-2 mt-3">
        <select id="serviceSelect" class="form-select form-select-sm">
          <option value="">All Services</option>
        </select>

        <button id="applyBtn" class="btn btn-primary btn-sm px-3">Apply</button>
      </div>

      <div id="errorBox" class="alert alert-danger d-none mt-3"></div>
    </section>

    <!-- Doctors list -->
    <section class="px-3 mt-4 mb-5">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h2 class="cb-section-title m-0">Doctors</h2>
        <span class="text-muted small" id="resultCount"></span>
      </div>

      <div id="doctorsList" class="d-flex flex-column gap-3">
        <!-- filled by JS -->
      </div>

      <div id="emptyBox" class="alert alert-info d-none mt-3">
        No doctors found.
      </div>
    </section>

    <!-- Bottom nav -->
    <nav class="cb-bottom-nav">
      <a class="cb-nav-item" href="home.html"><i class="bi bi-house"></i></a>
      <a class="cb-nav-item active" href="doctors.html"><i class="bi bi-people-fill"></i></a>
      <a class="cb-nav-item" href="#"><i class="bi bi-heart"></i></a>
      <a class="cb-nav-item" href="my-appointments.html"><i class="bi bi-person"></i></a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/doctors.js"></script>
</body>
</html>
