<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard - ClinicBooking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="cb-bg">
  <div class="cb-shell cb-page">

    <!-- Top Bar -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <div class="fw-semibold">Admin Dashboard</div>
        <div class="text-muted small" id="adminName">—</div>
      </div>
      <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">
        <i class="bi bi-box-arrow-right"></i> Logout
      </button>
    </div>

    <div id="dashError" class="alert alert-danger d-none"></div>

    <!-- Quick Actions -->
    <div class="row g-3">
      <div class="col-12 col-md-4">
        <a class="text-decoration-none" href="admin-doctors.html">
          <div class="card p-3 h-100">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <div class="fw-semibold">Doctors</div>
                <div class="text-muted small">CRUD / Upsert</div>
              </div>
              <i class="bi bi-people fs-3"></i>
            </div>
            <div class="mt-2 fw-semibold" id="doctorsCount">—</div>
          </div>
        </a>
      </div>

      <div class="col-12 col-md-4">
        <a class="text-decoration-none" href="admin-slots.html">
          <div class="card p-3 h-100">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <div class="fw-semibold">Slots</div>
                <div class="text-muted small">Bulk generator</div>
              </div>
              <i class="bi bi-clock fs-3"></i>
            </div>
            <div class="mt-2 text-muted small">Create slots for doctors</div>
          </div>
        </a>
      </div>

      <div class="col-12 col-md-4">
        <a class="text-decoration-none" href="admin-appointments.html">
          <div class="card p-3 h-100">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <div class="fw-semibold">Appointments</div>
                <div class="text-muted small">Filters + pagination</div>
              </div>
              <i class="bi bi-calendar2-check fs-3"></i>
            </div>
            <div class="mt-2 fw-semibold" id="apptsTotal">—</div>
          </div>
        </a>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/admin.js"></script>
  <script src="../js/admin-dashboard.js"></script>
</body>
</html>
