<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard - ClinicBooking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="../css/main.css" rel="stylesheet">
</head>

<body class="cb-bg">
  <div class="cb-shell">

    <!-- Top bar -->
    <header class="d-flex align-items-center justify-content-between pt-3 px-3">
      <div class="fw-semibold">Admin Dashboard</div>

      <button id="logoutBtn" class="btn btn-outline-dark btn-sm">
        <i class="bi bi-box-arrow-right"></i> Logout
      </button>
    </header>

    <!-- Content -->
    <section class="px-3 mt-3">
      <div class="alert alert-info">
        Logged in as: <span class="fw-semibold" id="adminName">Admin</span>
      </div>

      <div class="row g-3">
        <div class="col-12 col-md-6">
          <a href="admin-doctors.html" class="text-decoration-none">
            <div class="card p-3 shadow-sm">
              <div class="d-flex align-items-center justify-content-between">
                <div>
                  <div class="fw-semibold">Manage Doctors</div>
                  <div class="text-muted small">CRUD / Upsert</div>
                </div>
                <i class="bi bi-people fs-3"></i>
              </div>
            </div>
          </a>
        </div>

        <div class="col-12 col-md-6">
          <a href="admin-slots.html" class="text-decoration-none">
            <div class="card p-3 shadow-sm">
              <div class="d-flex align-items-center justify-content-between">
                <div>
                  <div class="fw-semibold">Manage Slots</div>
                  <div class="text-muted small">Bulk slot generator</div>
                </div>
                <i class="bi bi-calendar2-week fs-3"></i>
              </div>
            </div>
          </a>
        </div>

        <div class="col-12">
          <a href="admin-appointments.html" class="text-decoration-none">
            <div class="card p-3 shadow-sm">
              <div class="d-flex align-items-center justify-content-between">
                <div>
                  <div class="fw-semibold">Appointments</div>
                  <div class="text-muted small">Pagination + Filters</div>
                </div>
                <i class="bi bi-clipboard-check fs-3"></i>
              </div>
            </div>
          </a>
        </div>
      </div>
    </section>

    <!-- Admin bottom nav -->
    <nav class="cb-bottom-nav">
      <a class="cb-nav-item active" href="admin-dashboard.html"><i class="bi bi-speedometer2"></i></a>
      <a class="cb-nav-item" href="admin-doctors.html"><i class="bi bi-people"></i></a>
      <a class="cb-nav-item" href="admin-slots.html"><i class="bi bi-calendar2-week"></i></a>
      <a class="cb-nav-item" href="admin-appointments.html"><i class="bi bi-clipboard-check"></i></a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>

  <script src="../js/utils.dom.js"></script>
  <script src="../js/utils.ui.js"></script>
  <script src="../js/utils.session.js"></script>

  <script src="../js/admin-dashboard.js"></script>
</body>
</html>
