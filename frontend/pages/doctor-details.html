<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doctor - ClinicBooking</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Your main design tokens + components -->
  <link href="../css/main.css" rel="stylesheet">
</head>

<body class="cb-bg">
  <div class="cb-shell">

    <!-- Top bar -->
    <header class="d-flex align-items-center justify-content-between pt-3 px-3">
      <!-- Back button -->
      <a class="btn cb-icon-btn" href="home.html" title="Back">
        <i class="bi bi-chevron-left"></i>
      </a>

      <div class="fw-semibold">Doctor</div>

      <!-- Favorite (UI only for now) -->
      <button class="btn cb-icon-btn" type="button" title="Favorite">
        <i class="bi bi-heart"></i>
      </button>
    </header>

    <!-- Doctor hero section -->
    <section class="px-3 mt-3">
      <div class="cb-doctor-hero shadow-sm">
        <!-- JS will set real imageUrl -->
        <img id="doctorHeroImg" class="cb-doctor-hero-img"
             src="../assets/img/doctor-placeholder.png" alt="Doctor" />

        <!-- Overlay card on image -->
        <div class="cb-doctor-hero-card">
          <div class="cb-hero-name" id="doctorName">Doctor Name</div>
          <div class="cb-hero-sub" id="doctorTitle">Title</div>
          <div class="cb-hero-sub" id="doctorClinic">Clinic</div>
        </div>
      </div>

      <div class="d-flex justify-content-between align-items-center mt-3">
        <div class="text-muted small">
          Fee: <span class="fw-semibold" id="doctorFee">$0</span>
        </div>

        <div class="cb-rating">
          <i class="bi bi-star-fill"></i>
          <span id="doctorRating">—</span>
        </div>
      </div>

      <p class="text-muted small mt-2" id="doctorBio"></p>
    </section>

    <!-- Appointment booking -->
    <section class="px-3 mt-4">
      <h2 class="cb-section-title mb-2">Appointment</h2>

      <!-- Date + load slots -->
      <div class="d-flex align-items-center gap-2 mb-3">
        <input id="dateInput" type="date" class="form-control" />
        <button id="loadSlotsBtn" class="btn btn-primary">Load</button>
      </div>

      <!-- Slots UI states -->
      <div id="slotsError" class="alert alert-warning d-none"></div>
      <div id="slotsLoading" class="text-muted small d-none">Loading slots...</div>

      <!-- Available slots -->
      <div class="cb-slots-wrap" id="slotsWrap"></div>

      <!-- Confirm booking -->
      <button id="confirmBtn" class="btn btn-primary w-100 mt-3" disabled>
        Confirm
      </button>

      <!-- Booking result message -->
      <div id="bookMsg" class="alert alert-success d-none mt-3"></div>
    </section>

    <!-- Bottom nav -->
    <nav class="cb-bottom-nav">
      <a class="cb-nav-item" href="home.html"><i class="bi bi-house"></i></a>
      <a class="cb-nav-item active" href="doctors.html"><i class="bi bi-people"></i></a>
      <a class="cb-nav-item" href="#"><i class="bi bi-heart"></i></a>
      <a class="cb-nav-item" href="my-appointments.html"><i class="bi bi-person"></i></a>
    </nav>

  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <!-- Shared utilities (must be loaded BEFORE page scripts) -->
<script src="../js/utils.dom.js"></script>
<script src="../js/utils.ui.js"></script>
<script src="../js/utils.session.js"></script>

  <script src="../js/doctor-details.js"></script>
</body>
</html>
