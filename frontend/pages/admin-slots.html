<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Slots - ClinicBooking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="../css/main.css" rel="stylesheet">
</head>

<body class="cb-bg">
  <div class="cb-shell">

    <header class="d-flex align-items-center justify-content-between pt-3 px-3">
      <a class="btn cb-icon-btn" href="admin-dashboard.html" title="Back"><i class="bi bi-chevron-left"></i></a>
      <div class="fw-semibold">Admin Slots</div>
      <div></div>
    </header>

    <section class="px-3 mt-3">
      <div id="pageMsg" class="alert d-none"></div>

      <div class="card p-3 shadow-sm">
        <div class="fw-semibold mb-2">Bulk Slot Generator</div>

        <div class="row g-2">
          <div class="col-12">
            <label class="form-label">Doctor</label>
            <select id="doctorSelect" class="form-select">
              <option value="">Select doctor</option>
            </select>
          </div>

          <div class="col-12 col-md-4">
            <label class="form-label">Date</label>
            <input id="dateInput" type="date" class="form-control" />
          </div>

          <div class="col-6 col-md-4">
            <label class="form-label">Start</label>
            <input id="startInput" type="time" class="form-control" />
          </div>

          <div class="col-6 col-md-4">
            <label class="form-label">End</label>
            <input id="endInput" type="time" class="form-control" />
          </div>

          <div class="col-12 col-md-4">
            <label class="form-label">Slot minutes</label>
            <input id="minutesInput" type="number" min="5" step="5" value="30" class="form-control" />
          </div>

          <div class="col-12 col-md-8 d-flex align-items-end">
            <button id="createBtn" class="btn btn-primary w-100">
              Create Slots
            </button>
          </div>
        </div>
      </div>

      <div class="text-muted small mt-2">
        Note: DB prevents duplicates using unique index on (DoctorId, StartTime).
      </div>
    </section>

    <nav class="cb-bottom-nav">
      <a class="cb-nav-item" href="admin-dashboard.html"><i class="bi bi-speedometer2"></i></a>
      <a class="cb-nav-item" href="admin-doctors.html"><i class="bi bi-people"></i></a>
      <a class="cb-nav-item active" href="admin-slots.html"><i class="bi bi-calendar2-week"></i></a>
      <a class="cb-nav-item" href="admin-appointments.html"><i class="bi bi-clipboard-check"></i></a>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>

  <script src="../js/utils.dom.js"></script>
  <script src="../js/utils.ui.js"></script>
  <script src="../js/utils.session.js"></script>

  <script src="../js/admin-slots.js"></script>
</body>
</html>
