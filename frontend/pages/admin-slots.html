<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Slots - ClinicBooking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="../css/main.css" rel="stylesheet">
</head>

<body class="cb-bg">
  <div class="admin-layout">
    <div class="admin-sidebar-overlay" id="adminSidebarOverlay"></div>

    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-brand">Clinic Admin</div>

      <nav class="admin-sidebar-nav">
        <a class="admin-sidebar-link" href="admin-dashboard.html">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>

        <a class="admin-sidebar-link" href="admin-doctors.html">
          <i class="bi bi-people"></i>
          <span>Doctors</span>
        </a>

        <a class="admin-sidebar-link active" href="admin-slots.html">
          <i class="bi bi-calendar2-week"></i>
          <span>Slots</span>
        </a>

        <a class="admin-sidebar-link" href="admin-appointments.html">
          <i class="bi bi-clipboard-check"></i>
          <span>Appointments</span>
        </a>
      </nav>

      <div class="admin-sidebar-footer">
        <button id="logoutBtn" class="btn btn-outline-dark w-100">
          <i class="bi bi-box-arrow-right me-2"></i> Logout
        </button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <button class="admin-menu-btn" id="adminMenuBtn" type="button">
          <i class="bi bi-list"></i>
        </button>

        <h1 class="admin-page-title">Admin Slots</h1>

        <div></div>
      </header>

      <section class="admin-page-content">
        <div id="pageMsg" class="alert d-none"></div>

        <div class="card p-3 shadow-sm">
          <div class="fw-semibold mb-2">Bulk Slot Generator</div>

          <div class="row g-2">
            <div class="col-12 col-xl-6">
              <label class="form-label">Doctor</label>
              <select id="doctorSelect" class="form-select">
                <option value="">Select doctor</option>
              </select>
            </div>

            <div class="col-12 col-md-4 col-xl-2">
              <label class="form-label">Date</label>
              <input id="dateInput" type="date" class="form-control" />
            </div>

            <div class="col-6 col-md-4 col-xl-2">
              <label class="form-label">Start</label>
              <input id="startInput" type="time" class="form-control" />
            </div>

            <div class="col-6 col-md-4 col-xl-2">
              <label class="form-label">End</label>
              <input id="endInput" type="time" class="form-control" />
            </div>

            <div class="col-12 col-md-4 col-xl-2">
              <label class="form-label">Slot minutes</label>
              <input id="minutesInput" type="number" min="5" step="5" value="30" class="form-control" />
            </div>

            <div class="col-12 col-md-8 col-xl-4 d-flex align-items-end">
              <button id="createBtn" class="btn btn-primary w-100">
                Create Slots
              </button>
            </div>
          </div>
        </div>

        <div class="text-muted small mt-2">
          Note: DB prevents duplicates using unique index on (DoctorId, StartTime).
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.dom.js"></script>
  <script src="../js/utils.ui.js"></script>
  <script src="../js/utils.session.js"></script>

  <script>
    const adminSidebar = document.getElementById("adminSidebar");
    const adminSidebarOverlay = document.getElementById("adminSidebarOverlay");
    const adminMenuBtn = document.getElementById("adminMenuBtn");

    function openAdminSidebar() {
      adminSidebar?.classList.add("is-open");
      adminSidebarOverlay?.classList.add("show");
    }

    function closeAdminSidebar() {
      adminSidebar?.classList.remove("is-open");
      adminSidebarOverlay?.classList.remove("show");
    }

    adminMenuBtn?.addEventListener("click", openAdminSidebar);
    adminSidebarOverlay?.addEventListener("click", closeAdminSidebar);
    window.addEventListener("resize", () => {
      if (window.innerWidth >= 992) closeAdminSidebar();
    });
  </script>

  <script src="../js/admin-slots.js"></script>
</body>
</html>
