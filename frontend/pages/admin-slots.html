<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Slots - ClinicBooking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="cb-bg">
  <div class="cb-shell cb-page">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="d-flex align-items-center gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="admin-dashboard.html">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <div class="fw-semibold">Bulk Slot Generator</div>
          <div class="text-muted small">Create slots by date + time range</div>
        </div>
      </div>

      <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>

    <div id="pageError" class="alert alert-danger d-none"></div>
    <div id="pageOk" class="alert alert-success d-none"></div>

    <div class="card p-3">
      <div class="row g-2">
        <div class="col-12 col-md-6">
          <label class="form-label">Doctor</label>
          <select id="doctorId" class="form-select"></select>
        </div>

        <div class="col-12 col-md-6">
          <label class="form-label">Date (YYYY-MM-DD)</label>
          <input id="date" class="form-control" placeholder="2026-03-10" />
        </div>

        <div class="col-6 col-md-3">
          <label class="form-label">Start</label>
          <input id="startTime" class="form-control" placeholder="09:00" />
        </div>

        <div class="col-6 col-md-3">
          <label class="form-label">End</label>
          <input id="endTime" class="form-control" placeholder="13:00" />
        </div>

        <div class="col-12 col-md-3">
          <label class="form-label">Slot Minutes</label>
          <input id="slotMinutes" type="number" class="form-control" value="30" min="5" max="240" />
        </div>

        <div class="col-12 col-md-3 d-flex align-items-end">
          <button class="btn btn-primary w-100" id="createBtn">
            <i class="bi bi-plus-circle"></i> Create
          </button>
        </div>
      </div>

      <div class="text-muted small mt-2">
        <!-- short comment: helps admin understand the rule -->
        Note: duplicates are skipped (unique constraint by DoctorId + StartTime).
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/admin.js"></script>
  <script src="../js/admin-slots.js"></script>
</body>
</html>
