<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Appointments - ClinicBooking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="../css/main.css" rel="stylesheet">
  <link href="../css/admin.css" rel="stylesheet">
</head>

<body class="cb-bg">
  <div class="admin-layout">
    <div class="admin-sidebar-overlay" id="adminSidebarOverlay"></div>

    <aside class="admin-sidebar" id="adminSidebar">
      <div class="admin-sidebar-brand">Clinic Admin</div>

      <nav class="admin-sidebar-nav">
        <a class="admin-sidebar-link" href="admin-dashboard.html">
          <i class="bi bi-speedometer2"></i>
          <span>Dashboard</span>
        </a>

        <a class="admin-sidebar-link" href="admin-doctors.html">
          <i class="bi bi-people"></i>
          <span>Doctors</span>
        </a>

        <a class="admin-sidebar-link" href="admin-slots.html">
          <i class="bi bi-calendar2-week"></i>
          <span>Slots</span>
        </a>

        <a class="admin-sidebar-link active" href="admin-appointments.html">
          <i class="bi bi-clipboard-check"></i>
          <span>Appointments</span>
        </a>
      </nav>

      <div class="admin-sidebar-footer">
        <button id="logoutBtn" class="btn btn-outline-dark w-100">
          <i class="bi bi-box-arrow-right me-2"></i> Logout
        </button>
      </div>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <button class="admin-menu-btn" id="adminMenuBtn" type="button">
          <i class="bi bi-list"></i>
        </button>

        <h1 class="admin-page-title">Admin Appointments</h1>

        <button id="refreshBtn" class="btn btn-outline-primary btn-sm"><i class="bi bi-arrow-repeat"></i> Refresh</button>
      </header>

      <section class="admin-page-content">
        <div id="pageMsg" class="alert d-none"></div>

        <div class="card p-3 shadow-sm">
          <div class="row g-2">
            <div class="col-12 col-md-4">
              <label class="form-label">Status</label>
              <select id="statusSelect" class="form-select">
                <option value="">All</option>
                <option value="Booked">Booked</option>
                <option value="Cancelled">Cancelled</option>
                <option value="Completed">Completed</option>
              </select>
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">Doctor Id</label>
              <input id="doctorIdInput" type="number" min="1" class="form-control" placeholder="optional" />
            </div>

            <div class="col-12 col-md-4">
              <label class="form-label">Date</label>
              <input id="dateInput" type="date" class="form-control" />
            </div>

            <div class="col-12 d-flex gap-2 mt-2">
              <button id="applyBtn" class="btn btn-primary flex-grow-1">Apply</button>
              <button id="resetBtn" class="btn btn-outline-secondary">Reset</button>
            </div>
          </div>
        </div>

        <div class="mt-3 table-responsive">
          <table class="table table-sm align-middle">
            <thead>
              <tr>
                <th>#</th>
                <th>Doctor</th>
                <th>User</th>
                <th>Start</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>

        <div class="d-flex align-items-center justify-content-between mt-2">
          <button id="prevBtn" class="btn btn-outline-dark btn-sm">Prev</button>
          <div class="text-muted small" id="pageInfo">Page 1</div>
          <button id="nextBtn" class="btn btn-outline-dark btn-sm">Next</button>
        </div>

        <div id="emptyBox" class="alert alert-info d-none mt-3">No appointments.</div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/utils.dom.js"></script>
  <script src="../js/utils.ui.js"></script>
  <script src="../js/utils.session.js"></script>

  <script>
    const adminSidebar = document.getElementById("adminSidebar");
    const adminSidebarOverlay = document.getElementById("adminSidebarOverlay");
    const adminMenuBtn = document.getElementById("adminMenuBtn");

    function openAdminSidebar() {
      adminSidebar?.classList.add("is-open");
      adminSidebarOverlay?.classList.add("show");
    }

    function closeAdminSidebar() {
      adminSidebar?.classList.remove("is-open");
      adminSidebarOverlay?.classList.remove("show");
    }

    adminMenuBtn?.addEventListener("click", openAdminSidebar);
    adminSidebarOverlay?.addEventListener("click", closeAdminSidebar);
    window.addEventListener("resize", () => {
      if (window.innerWidth >= 992) closeAdminSidebar();
    });
  </script>

  <script src="../js/admin-appointments.js"></script>
</body>
</html>
