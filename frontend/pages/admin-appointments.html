<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Appointments - ClinicBooking</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="cb-bg">
  <div class="cb-shell cb-page">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="d-flex align-items-center gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="admin-dashboard.html">
          <i class="bi bi-arrow-left"></i>
        </a>
        <div>
          <div class="fw-semibold">Appointments</div>
          <div class="text-muted small">Filters + pagination</div>
        </div>
      </div>

      <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>

    <div id="pageError" class="alert alert-danger d-none"></div>

    <!-- Filters -->
    <div class="card p-3 mb-3">
      <div class="row g-2">
        <div class="col-12 col-md-3">
          <label class="form-label">Status</label>
          <select id="status" class="form-select">
            <option value="">All</option>
            <option value="Booked">Booked</option>
            <option value="Cancelled">Cancelled</option>
            <option value="Completed">Completed</option>
          </select>
        </div>

        <div class="col-12 col-md-3">
          <label class="form-label">Doctor</label>
          <select id="doctorId" class="form-select">
            <option value="">All</option>
          </select>
        </div>

        <div class="col-12 col-md-3">
          <label class="form-label">User Email</label>
          <input id="userEmail" class="form-control" placeholder="contains..." />
        </div>

        <div class="col-6 col-md-1">
          <label class="form-label">From</label>
          <input id="from" class="form-control" placeholder="YYYY-MM-DD" />
        </div>

        <div class="col-6 col-md-1">
          <label class="form-label">To</label>
          <input id="to" class="form-control" placeholder="YYYY-MM-DD" />
        </div>

        <div class="col-12 col-md-1 d-flex align-items-end">
          <button class="btn btn-outline-primary w-100" id="applyBtn">
            <i class="bi bi-funnel"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-responsive">
      <table class="table table-sm align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>Status</th>
            <th>User</th>
            <th>Doctor</th>
            <th>Slot</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="d-flex justify-content-between align-items-center mt-3">
      <div class="text-muted small" id="meta">—</div>
      <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm" id="prevBtn">Prev</button>
        <button class="btn btn-outline-secondary btn-sm" id="nextBtn">Next</button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/admin.js"></script>
  <script src="../js/admin-appointments.js"></script>
</body>
</html>
